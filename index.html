<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebApp - Listado de Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <style>
        /* Personalización de tonos morados */
        .bg-purple-dark { background-color: #4a148c !important; }
        .text-purple { color: #6a1b9a !important; }
        .btn-purple { background-color: #7b1fa2 !important; color: white !important; }
        .btn-purple:hover { background-color: #6a1b9a !important; }
        .page-item.active .page-link { background-color: #7b1fa2 !important; border-color: #7b1fa2 !important; }
        .table-purple { background-color: #4a148c !important; color: white !important; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-purple-dark mb-4 shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">💜 JS Frameworks App</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active fw-semibold" href="index.html">Inicio (DataTables)</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="formulario.html">Nuevo Usuario</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="card shadow p-4 border-0">
            <h2 class="card-title mb-4 text-purple fw-bold">Usuarios Registrados</h2>
            <div class="table-responsive">
                <table id="tablaUsuarios" class="table table-striped table-hover w-100">
                    <thead class="table-purple">
                        <tr>
                            <th>Nombre</th>
                            <th>Usuario</th>
                            <th>Email</th>
                            <th>Sitio Web</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
