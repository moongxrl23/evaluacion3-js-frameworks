<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebApp - Nuevo Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .bg-purple-dark { background-color: #4a148c !important; }
        .text-purple { color: #6a1b9a !important; }
        .btn-purple { background-color: #7b1fa2 !important; color: white !important; }
        .btn-purple:hover { background-color: #6a1b9a !important; }
        /* Foco del input en morado */
        .form-control:focus { border-color: #9c27b0; box-shadow: 0 0 0 0.25rem rgba(156, 39, 176, 0.25); }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-purple-dark mb-4 shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">💜 JS Frameworks App</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Inicio (DataTables)</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active fw-semibold" href="formulario.html">Nuevo Usuario</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow p-4 border-0">
                    <h2 class="card-title mb-4 text-purple fw-bold">Crear Nuevo Elemento</h2>
                    
                    <form id="formUsuario" novalidate>
                        <div class="mb-3">
                            <label for="nombre" class="form-label fw-medium">Nombre *</label>
                            <input type="text" id="nombre" class="form-control">
                            <div class="invalid-feedback">El nombre es obligatorio.</div>
                        </div>

                        <div class="mb-3">
                            <label for="username" class="form-label fw-medium">Usuario *</label>
                            <input type="text" id="username" class="form-control">
                            <div class="invalid-feedback">El nombre de usuario es obligatorio.</div>
                        </div>

                        <div class="mb-3">
                            <label for="fecha" class="form-label fw-medium">Fecha Ingreso *</label>
                            <input type="date" id="fecha" class="form-control">
                            <div class="invalid-feedback">Por favor, ingresa una fecha válida.</div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label fw-medium">Email *</label>
                            <input type="email" id="email" class="form-control" placeholder="usuario@servidor.dom">
                            <div class="invalid-feedback">Ingresa un formato de correo válido (usuario@servidor.dom).</div>
                        </div>

                        <div class="mb-3">
                            <label for="sitioWeb" class="form-label fw-medium">Sitio Web</label>
                            <input type="url" id="sitioWeb" class="form-control" placeholder="https://ejemplo.com">
                            <div class="invalid-feedback">Por favor, introduce una URL válida.</div>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <button type="button" id="btnCancelar" class="btn btn-outline-secondary">Cancelar</button>
                            <button type="submit" class="btn btn-purple px-4">Enviar</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
